<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Extreme AR Viewer | Batch Benchmark Pro</title>
  
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stats.js/16/Stats.min.js"></script>
  
  <style>
    :root{
      --bg:#0b0c10; --text:#c5c6c7; --muted:#8b8d8e; --card:#1f2833; --border:#45a29e;
      --accent:#66fcf1; --danger:#ff4c4c; --success:#155724;
    }
    * { box-sizing: border-box; }
    body{ margin:0; font-family: 'Segoe UI', Roboto, Arial, sans-serif; background:var(--bg); color:var(--text); overflow-x: hidden; }
    .wrap{ max-width: 1000px; margin: 0 auto; padding: 20px 16px; text-align:center; }
    h1{ margin: 0 0 10px; font-size: 24px; font-weight: 800; color: var(--accent); text-transform: uppercase; }
    
    .card{ background:var(--card); border:1px solid var(--border); border-radius:14px; padding: 20px; margin: 10px auto; }
    
    .uploadBox{
      background: rgba(69, 162, 158, 0.05); border: 2px dashed var(--accent);
      border-radius: 12px; padding: 30px; text-align: center; cursor: pointer;
    }
    .uploadBox p { margin: 0; color: var(--accent); font-weight: bold; }
    .uploadBox input{ display: none; }

    /* Performance UI */
    .viewerBox{ background:var(--card); border:1px solid var(--border); border-radius:14px; padding: 10px; margin-top: 15px; display: none; position: relative; }
    #stats-container { position: absolute; top: 15px; left: 15px; z-index: 10; filter: invert(1) hue-rotate(180deg); }

    .test-status-overlay {
      position: absolute; top: 15px; right: 15px; z-index: 11;
      background: rgba(11, 12, 16, 0.95); padding: 15px; border-radius: 10px;
      border: 1px solid var(--border); text-align: right; min-width: 200px;
    }
    .test-status-overlay.active { border-color: var(--danger); box-shadow: 0 0 20px rgba(255, 76, 76, 0.4); }

    /* Ergebnis-Tabelle */
    .results-table-container { margin-top: 20px; overflow-x: auto; display: none; }
    table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--border); font-size: 13px; }
    th, td { padding: 12px; border: 1px solid #333; text-align: left; }
    th { background: rgba(102, 252, 241, 0.1); color: var(--accent); }
    tr:nth-child(even) { background: rgba(255,255,255,0.02); }
    .val-avg { font-weight: bold; color: var(--accent); }

    model-viewer{ width: 100%; height: 60vh; background: #000; border-radius: 10px; }
    
    .btn-row { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
    button.ui {
      border: 1px solid var(--border); background: transparent; color: var(--accent);
      border-radius: 8px; padding: 12px 20px; font-weight: 700; cursor: pointer; text-transform: uppercase;
    }
    button.ui:hover { background: var(--border); color: #000; }
    button.primary { background: var(--accent); color: #000; border: none; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }

    #current-file-name { color: var(--accent); font-family: monospace; font-size: 14px; margin-bottom: 5px; display: block; }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>AR Batch Benchmarking</h1>
    
    <div class="card" id="uploadCard">
      <div class="uploadBox" id="uploadBox">
        <p>📁 MEHRERE .GLB DATEIEN WÄHLEN</p>
        <input type="file" id="fileInput" accept=".glb" multiple />
      </div>
      <div id="queueInfo" style="margin-top:10px; color:var(--muted);"></div>
    </div>

    <div class="card viewerBox" id="viewerBox">
      <div id="stats-container"></div>
      
      <div class="test-status-overlay" id="statusPanel">
        <span id="current-file-name">Keine Datei</span>
        <div style="font-size: 20px; font-weight: 800; color: var(--accent);" id="timerDisplay">BEREIT</div>
        <div id="queueProgress" style="font-size: 11px; margin-top:5px; color:var(--muted);">0 / 0 abgeschlossen</div>
        <button class="ui primary" id="btnStartBatch" style="width:100%; margin-top:10px;">BATCH-TEST STARTEN</button>
      </div>
      
      <model-viewer id="mv" camera-controls auto-rotate power-preference="high-performance"></model-viewer>
    </div>

    <div class="card results-table-container" id="resultsContainer">
      <h3 style="color:var(--accent); margin-top:0;">Ø TESTERGEBNISSE</h3>
      <table id="resultsTable">
        <thead>
          <tr>
            <th>Dateiname</th>
            <th>Min FPS</th>
            <th>Max FPS</th>
            <th>Avg FPS</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <button class="ui" style="margin-top:15px;" onclick="window.location.reload()">NEUER BATCH-TEST</button>
    </div>
  </div>

  <script>
    const mv = document.getElementById('mv');
    const viewerBox = document.getElementById('viewerBox');
    const fileInput = document.getElementById('fileInput');
    const uploadBox = document.getElementById('uploadBox');
    const btnStartBatch = document.getElementById('btnStartBatch');
    const timerDisplay = document.getElementById('timerDisplay');
    const resultsTableBody = document.querySelector('#resultsTable tbody');
    const resultsContainer = document.getElementById('resultsContainer');
    
    const stats = new Stats();
    stats.showPanel(0);
    document.getElementById('stats-container').appendChild(stats.dom);

    let filesQueue = [];
    let currentFileIndex = 0;
    let isTesting = false;
    let fpsData = [];
    let currentFps = 0;
    let lastTime = performance.now();

    // --- ENGINE ---
    function uncappedLoop() {
      stats.begin();
      const now = performance.now();
      const delta = now - lastTime;
      if (delta > 0) currentFps = 1000 / delta;
      lastTime = now;
      if (isTesting && mv.updateFramebuffer) mv.updateFramebuffer();
      stats.end();
      setTimeout(uncappedLoop, 0);
    }
    uncappedLoop();

    // --- UPLOAD / DATEI-WAHL ---
    uploadBox.onclick = () => fileInput.click();
    fileInput.onchange = (e) => {
      filesQueue = Array.from(e.target.files);
      if (filesQueue.length > 0) {
        document.getElementById('queueInfo').innerText = `${filesQueue.length} Datei(en) in der Warteschlange.`;
        viewerBox.style.display = 'block';
        updateQueueUI();
        loadModel(0);
      }
    };

    function loadModel(index) {
      if (!filesQueue[index]) return;
      const file = filesQueue[index];
      mv.src = URL.createObjectURL(file);
      document.getElementById('current-file-name').innerText = file.name;
    }

    function updateQueueUI() {
      document.getElementById('queueProgress').innerText = `${currentFileIndex} / ${filesQueue.length} abgeschlossen`;
    }

    // --- BATCH-LOGIK ---
    btnStartBatch.onclick = async () => {
      if (isTesting || filesQueue.length === 0) return;
      
      btnStartBatch.disabled = true;
      resultsContainer.style.display = 'none';
      resultsTableBody.innerHTML = '';
      currentFileIndex = 0;

      for (let i = 0; i < filesQueue.length; i++) {
        currentFileIndex = i;
        updateQueueUI();
        loadModel(i);
        
        // Kurze Pause zum Laden des Modells
        timerDisplay.innerText = "LADE...";
        await new Promise(r => setTimeout(r, 2000)); 

        // Starte 60s Messung
        await runSingleTest(filesQueue[i].name);
      }

      // Ende aller Tests
      timerDisplay.innerText = "ALLE FERTIG";
      resultsContainer.style.display = 'block';
      btnStartBatch.disabled = false;
      btnStartBatch.innerText = "TESTS ABGESCHLOSSEN";
    };

    function runSingleTest(fileName) {
      return new Promise((resolve) => {
        isTesting = true;
        fpsData = [];
        let timeLeft = 60;
        document.getElementById('statusPanel').classList.add('active');

        const interval = setInterval(() => {
          timeLeft--;
          timerDisplay.innerText = timeLeft + "s";
          
          if (currentFps > 0 && currentFps < 10000) fpsData.push(currentFps);

          if (timeLeft <= 0) {
            clearInterval(interval);
            isTesting = false;
            document.getElementById('statusPanel').classList.remove('active');
            
            // Ergebnis speichern
            saveResult(fileName, fpsData);
            resolve();
          }
        }, 1000);
      });
    }

    function saveResult(name, data) {
      const min = Math.round(Math.min(...data)) || 0;
      const max = Math.round(Math.max(...data)) || 0;
      const avg = Math.round(data.reduce((a, b) => a + b, 0) / data.length) || 0;

      const row = `<tr>
        <td>${name}</td>
        <td>${min}</td>
        <td>${max}</td>
        <td class="val-avg">${char(248)} ${avg}</td>
      </tr>`;
      resultsTableBody.insertAdjacentHTML('beforeend', row);
      resultsContainer.style.display = 'block'; // Tabelle währenddessen füllen
    }

    function char(code) { return String.fromCharCode(code); }
  </script>
</body>
</html>
